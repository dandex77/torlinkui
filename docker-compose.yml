services:
  torlink-web:
    build: .
    image: torlink-web
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      - PORT=${PORT:-3000}
      - DOWNLOAD_DIR=${DOWNLOAD_DIR:-~/torlink}
      - TORLINK_STATE_DIR=${STATE_DIR:-./state}
    volumes:
      - ${DOWNLOAD_DIR:-~/torlink}:/root/Downloads/torlink
      - ${STATE_DIR:-~/torlink/.state}:/app/state
    restart: always
